<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CEVA Control Tower — Reversa Hyundai</title>
<style>
:root{--uiZoom:.90;--bg:#f4f7fb;--side:#fff;--card:#fff;--card2:#eef3fa;--line:#d9e2ef;--text:#101828;--muted:#667085;--blue:#0f55b8;--red:#ef3340;--green:#22c55e;--yellow:#f59e0b;--cyan:#08b6c9;--shadow:0 8px 22px rgba(15,23,42,.08)}
body.dark{--bg:#070b14;--side:#0b1020;--card:#0f172a;--card2:#141f34;--line:#263854;--text:#eaf1ff;--muted:#9aa9c2;--shadow:0 12px 30px rgba(0,0,0,.35)}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px}
.app{height:111.111vh;width:111.111vw;display:flex;min-width:0;zoom:var(--uiZoom)}
.side{width:290px;min-width:290px;background:var(--side);border-right:1px solid var(--line);display:flex;flex-direction:column}
.logoTop{height:138px;display:grid;place-items:center;border-bottom:1px solid var(--line);padding:12px 18px;background:#fff;overflow:hidden}.logoTop img{width:100%;height:100%;object-fit:contain;display:block}
.logoBot{height:106px;display:grid;place-items:center;border-top:1px solid var(--line);padding:14px 18px;background:#fff;overflow:hidden}.logoBot img{width:100%;height:100%;object-fit:contain;display:block}
body.dark .logoTop,body.dark .logoBot{background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.09),transparent 64%),linear-gradient(180deg,#0b1020,#070b14)!important}
body.dark .logoTop img,body.dark .logoBot img{filter:drop-shadow(0 0 1px rgba(255,255,255,.8)) drop-shadow(0 8px 18px rgba(0,0,0,.68))}
.nav{flex:1;padding:18px 8px;overflow:auto}.navTitle{font-size:10px;letter-spacing:2.3px;text-transform:uppercase;color:var(--muted);font-weight:1000;margin:6px 8px 10px}
.nav button{width:100%;border:0;background:transparent;color:var(--muted);font-weight:950;font-size:15px;padding:13px 14px;border-radius:14px;display:flex;gap:12px;align-items:center;cursor:pointer;margin:6px 0;text-align:left}.nav button.active{color:var(--text);background:linear-gradient(90deg,rgba(15,85,184,.16),transparent);box-shadow:inset 4px 0 0 var(--blue)}.nav button:hover{background:var(--card2);color:var(--text)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}.top{min-height:96px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.78);backdrop-filter:blur(10px);display:grid;grid-template-columns:auto 1fr;gap:7px 9px;padding:4px 8px 8px}body.dark .top{background:rgba(11,16,32,.88)}
.title{display:flex;align-items:center;gap:10px}.hamb{width:38px;height:38px;border:1px solid var(--line);background:var(--card2);border-radius:12px;color:var(--text);font-size:22px;cursor:pointer}h1{font-size:22px;margin:0;font-weight:1000;white-space:nowrap}
.actions{display:flex;gap:7px;align-items:center;justify-content:flex-end;min-width:0}.search{width:min(440px,32vw);height:38px;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:0 13px;color:var(--text);font-size:14px;outline:none}
.badge{height:38px;border:1px solid #b7d7ff;background:#e8f3ff;color:#1760c2;border-radius:18px;padding:0 12px;display:flex;align-items:center;font-weight:950;font-size:13px;white-space:nowrap}body.dark .badge{background:#10223d;border-color:#28476f;color:#b9dbff}
.btn{height:38px;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:12px;padding:0 12px;font-weight:950;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap}.btn.red{background:var(--red);border-color:var(--red);color:white}.btn input{display:none}
.filters{grid-column:1/-1;display:grid;grid-template-columns:repeat(6,minmax(105px,1fr));gap:7px}.filters select{height:38px;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;padding:0 12px;font-size:14px}
.content{flex:1;overflow:auto;padding:10px 12px 20px}.page{display:block}.kpis{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:10px}.kpi{background:var(--card);border:1px solid var(--line);border-radius:15px;min-height:86px;padding:11px 13px;box-shadow:var(--shadow);position:relative;overflow:hidden}.kpi:before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--a,var(--blue))}.kpi.green{--a:var(--green)}.kpi.red{--a:var(--red)}.kpi.yellow{--a:var(--yellow)}.kt{font-size:9px;color:var(--muted);font-weight:1000;text-transform:uppercase;letter-spacing:.9px}.kv{font-size:24px;font-weight:1000;margin-top:6px}.ks{font-size:11px;color:var(--muted);margin-top:4px}.ki{position:absolute;right:13px;top:13px;font-size:23px;opacity:.18}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:14px 16px;box-shadow:var(--shadow);min-width:0}.hd{font-size:13px;font-weight:1000;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}.hd b{color:var(--text)}.insight{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:10px}.insI{width:54px;height:54px;border-radius:17px;background:rgba(239,51,64,.12);display:grid;place-items:center;font-size:29px}.insT{font-size:20px;font-weight:1000}.insP{font-size:14px;color:var(--muted);margin-top:5px;line-height:1.35}.insM{text-align:right;font-size:27px;font-weight:1000}.insM small{display:block;font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:1px}
.bars{display:flex;flex-direction:column;gap:9px;max-height:320px;overflow:auto}.bar{display:grid;grid-template-columns:minmax(130px,220px) 1fr 58px;gap:9px;align-items:center;cursor:pointer;padding:2px 4px;border-radius:10px;transition:background-color .12s ease,color .12s ease}.bar:hover{background:var(--card2)}.bn{font-size:13px;font-weight:950;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bt{height:16px;border-radius:99px;background:var(--card2);border:1px solid var(--line);overflow:hidden}.bf{height:100%;border-radius:99px}.bv{text-align:right;font-size:13px;font-weight:1000}
.tableWrap{overflow:auto;max-height:420px;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;font-size:12px}th{position:sticky;top:0;background:var(--card2);z-index:1;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.7px;text-align:left;padding:8px;white-space:nowrap}td{padding:7px 8px;border-top:1px solid var(--line);white-space:nowrap}tr:hover td{background:var(--card2)}.pager{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:9px;color:var(--muted);font-size:12px;font-weight:850}.pager button{border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:9px;padding:5px 10px;cursor:pointer;font-weight:900}.pager button:disabled{opacity:.4}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(10px);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:12px;padding:10px 16px;opacity:0;pointer-events:none;transition:.2s;z-index:99;font-weight:850}.toast.show{opacity:1;transform:translateX(-50%)}
@media(max-width:1360px){:root{--uiZoom:.86}.side{width:260px;min-width:260px}.logoTop{height:122px}.logoBot{height:96px}.kpis{grid-template-columns:repeat(3,1fr)}.filters{grid-template-columns:repeat(3,1fr)}.search{width:320px}.content{padding:9px}.card{padding:12px}}
@media(max-width:760px){:root{--uiZoom:1}.app{width:100vw;height:100vh;zoom:1}.side{position:fixed;left:-300px;top:0;bottom:0;z-index:20}.side.open{left:0}.top{grid-template-columns:1fr}.actions{justify-content:flex-start;flex-wrap:wrap}.filters{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.search{width:100%}.insight{grid-template-columns:1fr}.insM{text-align:left}}


/* ==========================================================

html,body{width:100%;height:100%;overflow:hidden!important}
.app{width:100vw!important;height:100vh!important;zoom:1!important;display:flex!important;min-width:0!important;overflow:hidden!important}
.main{min-width:0!important;max-width:100%!important;overflow:hidden!important}
.content{min-width:0!important;overflow:auto!important;padding:10px 12px 20px!important}
.top{grid-template-columns:auto minmax(0,1fr)!important;gap:7px 8px!important;overflow:hidden!important}
.actions{min-width:0!important;max-width:100%!important;overflow:hidden!important;gap:6px!important;justify-content:flex-end!important;flex-wrap:nowrap!important}
.search{flex:1 1 210px!important;min-width:150px!important;max-width:330px!important;width:auto!important}
.badge{flex:0 0 auto!important;min-width:0!important;padding:0 8px!important;font-size:11px!important;height:36px!important}
.btn{flex:0 0 auto!important;padding:0 8px!important;font-size:11px!important;height:36px!important}
.hamb{width:36px!important;height:36px!important}h1{font-size:20px!important}
@media (min-width:761px){
  .side{width:196px!important;min-width:196px!important;transition:width .22s ease,min-width .22s ease,opacity .18s ease!important;overflow:hidden!important}
  .logoTop{height:96px!important;padding:8px 12px!important}.logoBot{height:76px!important;padding:10px 12px!important}
  .logoTop img,.logoBot img{max-width:100%!important;max-height:100%!important;object-fit:contain!important}
  .nav{padding:12px 5px!important}.nav button{font-size:12.5px!important;padding:10px 9px!important;border-radius:11px!important;gap:9px!important;margin:4px 0!important}.nav button span{width:18px!important;min-width:18px!important;text-align:center!important}
  .filters{grid-template-columns:repeat(6,minmax(88px,1fr))!important;gap:7px!important}.filters select{min-width:0!important;padding:0 9px!important;font-size:12.5px!important;height:36px!important}
  .kpis{grid-template-columns:repeat(6,minmax(0,1fr))!important;gap:8px!important}.kpi{min-height:76px!important;padding:10px 10px!important;border-radius:14px!important}
  .kv{font-size:21px!important}.kt{font-size:8px!important}.ks{font-size:10px!important}.ki{font-size:21px!important}.grid2{grid-template-columns:1fr 1fr!important}.card{padding:14px 16px!important}
}
@media (min-width:761px){body.menu-collapsed .side{width:0!important;min-width:0!important;border-right:0!important;opacity:0!important}}
@media (min-width:761px) and (max-width:1450px){.side{width:184px!important;min-width:184px!important}.search{max-width:285px!important;min-width:140px!important}.badge{font-size:10.5px!important;padding:0 7px!important}.btn{font-size:10.5px!important;padding:0 7px!important}.filters{grid-template-columns:repeat(6,minmax(82px,1fr))!important}}
@media(max-width:760px){.app{width:100vw!important;height:100vh!important;zoom:1!important;transform:none!important}.side{width:290px!important;min-width:290px!important}.actions{justify-content:flex-start!important;flex-wrap:wrap!important;overflow:visible!important}.search{width:100%!important;max-width:none!important;flex:1 1 100%!important}}
.navTitle{font-size:12px!important;letter-spacing:1.1px!important;margin:6px 8px 12px!important;padding:0 0 8px!important;color:#0f55b8!important;font-weight:1000!important;text-transform:none!important;white-space:nowrap!important;text-align:center!important;animation:none!important;background:transparent!important;border:0!important;border-bottom:2px solid rgba(15,85,184,.30)!important;box-shadow:none!important;line-height:1!important}.navTitle::after{content:none!important}body.dark .navTitle{color:#b9dbff!important;border-bottom-color:rgba(185,219,255,.25)!important;background:transparent!important}
.miniChart{display:flex;align-items:flex-end;gap:10px;height:150px;padding:8px 4px 2px}.mbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}.mfill{width:100%;border-radius:10px 10px 4px 4px;background:linear-gradient(180deg,#2563eb,#0f55b8);min-height:5px;box-shadow:0 8px 18px rgba(15,85,184,.16)}.mlab{font-size:10px;color:var(--muted);font-weight:900}.mval{font-size:11px;font-weight:1000;color:var(--text)}
@keyframes alertPulse{0%,100%{box-shadow:0 0 0 rgba(239,51,64,0);transform:scale(1)}50%{box-shadow:0 0 0 7px rgba(239,51,64,.16);transform:scale(1.006)}}
.alertCharge{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;border:1px solid rgba(239,51,64,.55);background:linear-gradient(135deg,rgba(239,51,64,.14),var(--card));border-radius:18px;padding:16px;margin-bottom:10px;animation:alertPulse 1.35s infinite;cursor:pointer}.alertIcon{width:52px;height:52px;border-radius:16px;background:rgba(239,51,64,.16);display:grid;place-items:center;font-size:28px}.alertTitle{font-size:20px;font-weight:1000}.alertText{color:var(--muted);font-size:14px;line-height:1.35;margin-top:4px}.alertNumber{text-align:right;font-size:30px;font-weight:1000}.alertNumber small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.chargeGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.chargeItem{border:1px solid var(--line);background:var(--card2);border-radius:14px;padding:12px;cursor:pointer}.chargeItem:hover{filter:brightness(1.04)}.chargeResp{font-weight:1000;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chargeMeta{color:var(--muted);font-size:11px;margin-top:4px}.chargeQtd{font-size:24px;font-weight:1000;margin-top:8px}.priorityWrap{max-height:360px;overflow:auto;border:1px solid var(--line);border-radius:14px}.priorityWrap table{font-size:11.5px}.risk{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:1000}.risk.high{background:rgba(239,51,64,.14);color:#ef3340}.risk.mid{background:rgba(245,158,11,.14);color:#f59e0b}.risk.low{background:rgba(34,197,94,.12);color:#22c55e}

</style>

div class="tableWrap"><table><thead><tr>${heads.map(h=>`<th>${esc(h)}</th>`).join('')}<th>Próxima ação</th><th>Responsável</th></tr></thead><tbody>${slice.map(r=>`<tr>${heads.map(h=>`<td>${esc(r.raw[h]??'')}</td>`).join('')}<td>${esc(r.proxima)}</td><td><b>${esc(r.responsavel)}</b></td></tr>`).join('')}</tbody></table></div><div class="pager"><button onclick="DETAIL_PAGE--;render()" ${DETAIL_PAGE<=1?'disabled':''}>← Anterior</button><span>${fmt((DETAIL_PAGE-1)*per+1)}-${fmt(Math.min(DETAIL_PAGE*per,total))} de ${fmt(total)}</span><button onclick="DETAIL_PAGE++;render()" ${DETAIL_PAGE>=pages?'disabled':''}>Próxima →</button></div></div>`}function stats(rows=FILTERED){let nums=rows.map(r=>Number(r.diasSem)||0).filter(n=>n>=0),total=rows.length,fora=rows.filter(r=>String(r.statusSla).includes('Fora do Prazo')).length,no=rows.filter(r=>r.statusSla==='✔ No Prazo').length,conc=rows.filter(r=>String(r.statusSla).includes('Concluído')).length;return{total,no,fora,conc,parado:rows.filter(r=>Number(r.diasSem)>7).length,aten:rows.filter(r=>Number(r.diasSem)>3&&Number(r.diasSem)<=7).length,over90:rows.filter(r=>Number(r.diasSem)>=90).length,max:Math.max(0,...nums),avg:nums.length?nums.reduce((a,b)=>a+b,0)/nums.length:0,pctFora:total?fora/total*100:0}}
